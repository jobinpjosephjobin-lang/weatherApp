<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>കാലാവസ്ഥ വിവരങ്ങൾ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🌦️ കാലാവസ്ഥ വിവരങ്ങൾ</h1>

    <div class="card">
        <h2>ഇന്നത്തെ കാലാവസ്ഥ</h2>
        <p id="weather">കാലാവസ്ഥ പരിശോധിക്കുന്നു...</p>
    </div>

    <div class="card">
        <h2>🌧️ ഇന്നത്തെ മഴ സാധ്യത</h2>
        <p id="rain">വിവരം പരിശോധിക്കുന്നു...</p>
    </div>

    <div class="card">
        <h2>അടുത്ത 2 ദിവസത്തെ കാലാവസ്ഥ</h2>
        <p id="forecast">പ്രവചനം പരിശോധിക്കുന്നു...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
